hf_id: Qwen/Qwen3-235B-A22B
title: Qwen3-235B-A22B
provider: Qwen
description: >
  Qwen3 系列最大的 MoE 变体，总参数 235B，每 token 激活 22B。
  在推理、指令跟随、Agent 能力和多语言方面有突破性提升。
architecture: moe
parameters: "235B"
active_parameters: "22B"
context_length: 131072
modality: text
updated: "2026-07-01"

overview: |
  Qwen3 是 Qwen 系列的最新一代大语言模型，提供 Dense 和 MoE 两种架构。

  Qwen3-235B-A22B 是最大的 MoE 变体，总参数 235B，每 token 激活 22B。在推理、指令跟随、
  Agent 能力和多语言支持方面有突破性提升。

  **首次支持版本**：v0.8.4rc2。本文档基于 **vLLM-Ascend v0.21.0** 验证编写，
  所有 v0.21.0 及以上版本可稳定运行。

