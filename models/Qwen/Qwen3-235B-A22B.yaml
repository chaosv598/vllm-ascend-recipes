quantization:
  content: |
    如需自行进行 W8A8 量化，可使用 **msmodelslim** 工具：

    ### 安装 msmodelslim

    ```bash
    git clone https://gitcode.com/Ascend/msmodelslim.git
    cd msmodelslim
    bash install.sh
    ```

    > 安装成功后会显示 `Successfully installed msmodelslim-{version}`

    ### 执行量化

    ```bash
    cd examples/Qwen3-MOE
    python3 quant_qwen_moe_w8a8.py \
        --model_path /path/to/your/Qwen3-235B-A22B \
        --save_path /path/to/your/Qwen3-235B-A22B-W8A8-rot \
        --anti_dataset ../common/qwen3-moe_anti_prompt_50.json \
        --calib_dataset ../common/qwen3-moe_calib_prompt_50.json \
        --trust_remote_code True \
        --rot
    ```

prerequisites:
  - title: "硬件要求"
    content: |
      | 模型版本 | 硬件要求 |
      |---------|---------|
      | Qwen3-235B-A22B (BF16) | 1 × Atlas 800I A3 (64G × 16) 或 1 × Atlas 800I A2 (64G × 8) |
      | Qwen3-235B-A22B-W8A8 | 1 × Atlas 800I A3 (64G × 16) 或 1 × Atlas 800I A2 (64G × 8) |

      > 以上为推荐卡数，可根据实际情况调整。
  - title: "多节点通信验证（可选）"
    content: |
      如需部署多节点环境，需先验证多节点通信。

      参考 [多节点通信验证指南](https://docs.vllm.ai/projects/ascend/en/latest/installation.html#verify-multi-node-communication)。

env_setup:
  pip:
    content: |
      ```bash
      git clone https://github.com/vllm-project/vllm.git
      cd vllm && pip install -e .

      git clone https://github.com/vllm-project/vllm-ascend.git
      cd vllm-ascend && pip install -e .
      ```

      验证安装：

      ```bash
      pip show vllm-ascend
      ```
  container:
    content: |
      **A3 系列：**

      ```bash
      export IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1-a3
      docker run --rm \
          --name vllm-ascend-env \
          --shm-size=1g --net=host \
          --device /dev/davinci0 --device /dev/davinci1 \
          --device /dev/davinci2 --device /dev/davinci3 \
          --device /dev/davinci4 --device /dev/davinci5 \
          --device /dev/davinci6 --device /dev/davinci7 \
          --device /dev/davinci8 --device /dev/davinci9 \
          --device /dev/davinci10 --device /dev/davinci11 \
          --device /dev/davinci12 --device /dev/davinci13 \
          --device /dev/davinci14 --device /dev/davinci15 \
          --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \
          -v /usr/local/dcmi:/usr/local/dcmi \
          -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \
          -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
          -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \
          -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info \
          -v /etc/ascend_install.info:/etc/ascend_install.info \
          -v /root/.cache:/root/.cache \
          -it $IMAGE bash
      ```

      > A3 有 8 个 NPU，双 die 设计（共 16 个 chip：`/dev/davinci[0-15]`）。共享机器上可只映射需要的 chip。

      **A2 系列：**

      ```bash
      export IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1
      docker run --rm \
          --name vllm-ascend-env \
          --shm-size=1g --net=host \
          --device /dev/davinci0 --device /dev/davinci1 \
          --device /dev/davinci2 --device /dev/davinci3 \
          --device /dev/davinci4 --device /dev/davinci5 \
          --device /dev/davinci6 --device /dev/davinci7 \
          --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \
          -v /usr/local/dcmi:/usr/local/dcmi \
          -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \
          -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \
          -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \
          -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info \
          -v /etc/ascend_install.info:/etc/ascend_install.info \
          -v /root/.cache:/root/.cache \
          -it $IMAGE bash
      ```

      > 默认工作目录为 `/workspace`，vLLM 和 vLLM-Ascend 已作为 Python 包安装在 site-packages 中。

scenarios:
  - npu: "Atlas 800I A2"
    precision: "W8A8"
    deployment: "单节点-多卡"
    verified: true
    steps:
      - title: "环境变量配置"
        content: |
          ```bash
          export VLLM_USE_MODELSCOPE=True
          export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
          export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True
          export HCCL_BUFFSIZE=512
          export OMP_PROC_BIND=false
          export OMP_NUM_THREADS=1
          export TASK_QUEUE_ENABLE=1
          ```
      - title: "启动服务"
        content: |
          ```bash
          vllm serve your_model_path \
              --host <host_ip> \
              --port <port> \
              --tensor-parallel-size 8 \
              --data-parallel-size 1 \
              --seed 1024 \
              --quantization ascend \
              --served-model-name qwen3 \
              --max-num-seqs 32 \
              --max-model-len 131072 \
              --max-num-batched-tokens 8096 \
              --enable-expert-parallel \
              --trust-remote-code \
              --gpu-memory-utilization 0.95 \
              --hf-overrides '{"rope_parameters": {"rope_type":"yarn","rope_theta":1000000,"factor":4,"original_max_position_embeddings":32768}}' \
              --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}' \
              --additional-config '{"enable_flashcomm1": true}' \
