quantization:
  content: "To perform W8A8 quantization yourself, use the **msmodelslim** tool:\n\n### Install msmodelslim\n\n```bash\n#\
    \ 1. Clone the msmodelslim repository.\ngit clone https://gitcode.com/Ascend/msmodelslim.git\n\n# 2. Enter the msmodelslim\
    \ directory and run the installation script.\ncd msmodelslim\nbash install.sh\n\n# The following message indicates that\
    \ msmodelslim has been installed successfully.\n# Successfully installed msmodelslim-{version}\n```\n\n### Run quantization\n\
    \n```bash\ncd examples/Qwen3-MOE\npython3 quant_qwen_moe_w8a8.py \\\n    --model_path /path/to/your/Qwen3-235B-A22B \\\
    \n    --save_path /path/to/your/Qwen3-235B-A22B-W8A8-rot \\\n    --anti_dataset ../common/qwen3-moe_anti_prompt_50.json\
    \ \\\n    --calib_dataset ../common/qwen3-moe_calib_prompt_50.json \\\n    --trust_remote_code True \\\n    --rot\n```\n"
prerequisites:
- title: Hardware Requirements
  content: '| Model | Hardware Requirement |

    |-------|---------------------|

    | Qwen3-235B-A22B (BF16) | 1 × Atlas 800I A3 (64G × 16), 1 × Atlas 800I A2 (64G × 8) |

    | Qwen3-235B-A22B-W8A8 | 1 × Atlas 800I A3 (64G × 16), 1 × Atlas 800I A2 (64G × 8) |


    > These are the recommended numbers of cards, which can be adjusted according to the actual situation.

    '
- title: Verify Multi-node Communication (Optional)
  content: 'If you need to deploy a multi-node environment, verify the multi-node communication first.


    Refer to [Verify Multi-node Communication Environment](https://docs.vllm.ai/projects/ascend/en/latest/installation.html#verify-multi-node-communication).

    '
env_setup:
  pip:
    content: '```bash

      git clone https://github.com/vllm-project/vllm.git

      cd vllm

      pip install -e .


      git clone https://github.com/vllm-project/vllm-ascend.git

      cd vllm-ascend

      pip install -e .

      ```


      Verify installation:


      ```bash

      pip show vllm-ascend

      ```


      > If deploying a multi-node environment, set up the environment on each node.

      '
  container:
    content: "**A3 series:**\n\n```bash\nexport IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1-a3\ndocker run --rm \\\n    --name\
      \ vllm-ascend-env \\\n    --shm-size=1g --net=host \\\n    --device /dev/davinci0 --device /dev/davinci1 \\\n    --device\
      \ /dev/davinci2 --device /dev/davinci3 \\\n    --device /dev/davinci4 --device /dev/davinci5 \\\n    --device /dev/davinci6\
      \ --device /dev/davinci7 \\\n    --device /dev/davinci8 --device /dev/davinci9 \\\n    --device /dev/davinci10 --device\
      \ /dev/davinci11 \\\n    --device /dev/davinci12 --device /dev/davinci13 \\\n    --device /dev/davinci14 --device /dev/davinci15\
      \ \\\n    --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi\
      \ \\\n    -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi\
      \ \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info\
      \ \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info \\\n    -v /root/.cache:/root/.cache \\\n    -it $IMAGE\
      \ bash\n```\n\n> A3 has 8 NPUs with dual-die design (16 chips total: `/dev/davinci[0-15]`). On shared machines, map\
      \ only the chips you need.\n\n**A2 series:**\n\n```bash\nexport IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1\ndocker\
      \ run --rm \\\n    --name vllm-ascend-env \\\n    --shm-size=1g --net=host \\\n    --device /dev/davinci0 --device /dev/davinci1\
      \ \\\n    --device /dev/davinci2 --device /dev/davinci3 \\\n    --device /dev/davinci4 --device /dev/davinci5 \\\n \
      \   --device /dev/davinci6 --device /dev/davinci7 \\\n    --device /dev/davinci_manager --device /dev/devmm_svm --device\
      \ /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi \\\n    -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool\
      \ \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/\
      \ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info\
      \ \\\n    -v /root/.cache:/root/.cache \\\n    -it $IMAGE bash\n```\n\n> The default workdir is `/workspace`. vLLM and\
      \ vLLM-Ascend are installed as Python packages in site-packages.\n"
scenarios:
- npu: Atlas 800I A2
  precision: W8A8
  deployment: 单节点-多卡
  verified: true
  steps:
  - title: Environment Variables
    content: '```bash

      export VLLM_USE_MODELSCOPE=True

      export ASCEND_RT_VISIBLE_DEVICES=0,1,2,3,4,5,6,7

      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

      export HCCL_BUFFSIZE=512

      export OMP_PROC_BIND=false

      export OMP_NUM_THREADS=1

      export TASK_QUEUE_ENABLE=1

      ```

      '
  - title: Start Service
    content: "```bash\nvllm serve your_model_path \\\n    --host <host_ip> \\\n    --port <port> \\\n    --tensor-parallel-size\
      \ 8 \\\n    --data-parallel-size 1 \\\n    --seed 1024 \\\n    --quantization ascend \\\n    --served-model-name qwen3\
      \ \\\n    --max-num-seqs 32 \\\n    --max-model-len 131072 \\\n    --max-num-batched-tokens 8096 \\\n    --enable-expert-parallel\
      \ \\\n    --trust-remote-code \\\n    --gpu-memory-utilization 0.95 \\\n    --hf-overrides '{\"rope_parameters\": {\"\
      rope_type\":\"yarn\",\"rope_theta\":1000000,\"factor\":4,\"original_max_position_embeddings\":32768}}' \\\n    --compilation-config\
      \ '{\"cudagraph_mode\":\"FULL_DECODE_ONLY\"}' \\\n    --additional-config '{\"enable_flashcomm1\": true}' \\\n    --async-scheduling\n\
      ```\n\n> The above is an example configuration. Adjust parameters based on your actual scenario.\n"
  - title: Verify Service
    content: 'If the service starts successfully, the following startup log will be displayed:


      ```text

      (APIServer pid=<pid>) INFO:     Started server process [<pid>]

      (APIServer pid=<pid>) INFO:     Waiting for application startup.

      (APIServer pid=<pid>) INFO:     Application startup complete.

