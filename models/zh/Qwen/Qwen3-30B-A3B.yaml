title: Qwen3-30B-A3B
provider: Qwen
description: 'Qwen3 系列 MoE 模型，总参数 30.5B，每 token 激活 3.3B。 稀疏 MoE 架构实现高效训练和推理，在相近能力的稠密模型上具有更低计算成本。

  '
architecture: moe
parameters: 30.5B
active_parameters: 3.3B
context_length: 40960
modality: text
updated: '2026-07-01'
overview: 'Qwen3-30B-A3B 是 Qwen3 系列中的 MoE 模型，总参数 30.5B，每 token 激活 3.3B。

  稀疏 MoE 架构实现了高效训练和推理，在推理、指令跟随和 Agent 能力方面表现优异，

  同时保持比相近能力稠密模型更低的计算成本。


  **首次支持版本**：v0.8.4rc2。本文档基于 **vLLM-Ascend v0.22.1rc** 验证编写，

  所有 v0.22.1rc 及以上版本可稳定运行。

  '
