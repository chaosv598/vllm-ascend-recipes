env_setup:
  pip:
    content: '```bash

      git clone https://github.com/vllm-project/vllm.git

      cd vllm

      pip install -e .


      git clone https://github.com/vllm-project/vllm-ascend.git

      cd vllm-ascend

      pip install -e .

      ```


      验证安装：


      ```bash

      pip show vllm-ascend

      ```


      > 如果部署多节点环境，需要每个节点都执行相同的安装步骤。

      '
  container:
    content: "**A3 系列：**\n\n```bash\nexport IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1-a3\ndocker run --rm \\\n    --name\
      \ vllm-ascend-env \\\n    --shm-size=1g --net=host \\\n    --device /dev/davinci0 --device /dev/davinci1 \\\n    --device\
      \ /dev/davinci2 --device /dev/davinci3 \\\n    --device /dev/davinci4 --device /dev/davinci5 \\\n    --device /dev/davinci6\
      \ --device /dev/davinci7 \\\n    --device /dev/davinci8 --device /dev/davinci9 \\\n    --device /dev/davinci10 --device\
      \ /dev/davinci11 \\\n    --device /dev/davinci12 --device /dev/davinci13 \\\n    --device /dev/davinci14 --device /dev/davinci15\
      \ \\\n    --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi\
      \ \\\n    -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi\
      \ \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info\
      \ \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info \\\n    -v /root/.cache:/root/.cache \\\n    -it $IMAGE\
      \ bash\n```\n\n> A3 有 8 个 NPU，双 die 设计（共 16 个 chip：`/dev/davinci[0-15]`）。共享机器上可只映射需要的 chip。\n\n**A2 系列：**\n\n```bash\n\
      export IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1\ndocker run --rm \\\n    --name vllm-ascend-env \\\n    --shm-size=1g\
      \ --net=host \\\n    --device /dev/davinci0 --device /dev/davinci1 \\\n    --device /dev/davinci2 --device /dev/davinci3\
      \ \\\n    --device /dev/davinci4 --device /dev/davinci5 \\\n    --device /dev/davinci6 --device /dev/davinci7 \\\n \
      \   --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi\
      \ \\\n    -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi\
      \ \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info\
      \ \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info \\\n    -v /root/.cache:/root/.cache \\\n    -it $IMAGE\
      \ bash\n```\n\n> 默认工作目录为 `/workspace`，vLLM 和 vLLM-Ascend 已作为 Python 包安装在 site-packages 中。\n"
