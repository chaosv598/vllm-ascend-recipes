quantization:
  content: "如需自行进行 W8A8 量化，可使用 **msmodelslim** 工具：\n\n### 安装 msmodelslim\n\n```bash\n# 1. 克隆 msmodelslim 仓库\ngit clone https://gitcode.com/Ascend/msmodelslim.git\n\
    \n# 2. 进入 msmodelslim 目录并运行安装脚本\ncd msmodelslim\nbash install.sh\n\n# 出现以下信息表示 msmodelslim 安装成功\n# Successfully installed\
    \ msmodelslim-{version}\n```\n\n### 执行量化\n\n```bash\ncd examples/Qwen3-MOE\npython3 quant_qwen_moe_w8a8.py \\\n    --model_path\
    \ /path/to/your/Qwen3-235B-A22B \\\n    --save_path /path/to/your/Qwen3-235B-A22B-W8A8-rot \\\n    --anti_dataset ../common/qwen3-moe_anti_prompt_50.json\
    \ \\\n    --calib_dataset ../common/qwen3-moe_calib_prompt_50.json \\\n    --trust_remote_code True \\\n    --rot\n```\n"
prerequisites:
