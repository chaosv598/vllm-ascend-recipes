- npu: Atlas 800I A3
  precision: W8A8
  deployment: 单节点-PD混合
  verified: true
  steps:
  - title: 高吞吐配置 (TP4, DP4)
    content: "单节点 PD 混合部署，优化 Atlas 800I A3 (64G × 16) 上的最大吞吐：\n\n```bash\nexport HCCL_IF_IP=<node_ip>\nexport GLOO_SOCKET_IFNAME=<ifname>\n\
      export TP_SOCKET_IFNAME=<ifname>\nexport HCCL_SOCKET_IFNAME=<ifname>\nexport HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport\
      \ HCCL_BUFFSIZE=1024\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport OMP_NUM_THREADS=1\necho performance\
      \ | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\nsysctl -w vm.swappiness=0\nsysctl -w kernel.numa_balancing=0\n\
      sysctl kernel.sched_migration_cost_ns=50000\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export TASK_QUEUE_ENABLE=1\n\nvllm serve your_model_path \\\n    --served-model-name qwen3 \\\n    --host <host_ip>\
      \ --port <port> \\\n    --async-scheduling \\\n    --tensor-parallel-size 4 \\\n    --data-parallel-size 4 \\\n    --data-parallel-size-local\
      \ 4 \\\n    --data-parallel-start-rank 0 \\\n    --data-parallel-address <node_ip> \\\n    --data-parallel-rpc-port\
      \ <rpc_port> \\\n    --enable-expert-parallel \\\n    --max-num-seqs 128 \\\n    --max-model-len 32768 \\\n    --max-num-batched-tokens\
      \ 16384 \\\n    --gpu-memory-utilization 0.9 \\\n    --trust-remote-code --quantization ascend \\\n    --no-enable-prefix-caching\
      \ \\\n    --compilation-config '{\"cudagraph_mode\": \"FULL_DECODE_ONLY\"}' \\\n    --additional-config '{\"enable_cpu_binding\"\
      :true, \"enable_flashcomm1\": true, \"enable_fused_mc2\": 1}'\n```\n"
  - title: 低延迟配置 (TP16, Eagle3 投机解码)
    content: "单节点 PD 混合部署，使用 Eagle3 投机解码优化低延迟：\n\n```bash\nexport HCCL_IF_IP=<node_ip>\nexport GLOO_SOCKET_IFNAME=<ifname>\n\
      export TP_SOCKET_IFNAME=<ifname>\nexport HCCL_SOCKET_IFNAME=<ifname>\nexport HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport\
      \ HCCL_BUFFSIZE=1024\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport OMP_NUM_THREADS=1\necho performance\
      \ | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\nsysctl -w vm.swappiness=0\nsysctl -w kernel.numa_balancing=0\n\
      sysctl kernel.sched_migration_cost_ns=50000\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export TASK_QUEUE_ENABLE=1\n\nvllm serve your_model_path \\\n    --served-model-name qwen3 \\\n    --host <host_ip>\
      \ --port <port> \\\n    --async-scheduling \\\n    --tensor-parallel-size 16 \\\n    --data-parallel-size 1 \\\n   \
      \ --data-parallel-size-local 1 \\\n    --data-parallel-start-rank 0 \\\n    --data-parallel-address <node_ip> \\\n \
      \   --data-parallel-rpc-port <rpc_port> \\\n    --enable-expert-parallel \\\n    --max-num-seqs 128 \\\n    --max-model-len\
      \ 32768 \\\n    --max-num-batched-tokens 16384 \\\n    --gpu-memory-utilization 0.9 \\\n    --trust-remote-code --quantization\
      \ ascend \\\n    --no-enable-prefix-caching \\\n    --compilation-config '{\"cudagraph_mode\": \"FULL_DECODE_ONLY\"\
      }' \\\n    --speculative-config '{\"method\": \"eagle3\", \"model\":\"your_eagle3_model_path\", \"num_speculative_tokens\"\
      : 3}' \\\n    --additional-config '{\"enable_cpu_binding\":true, \"enable_flashcomm1\": true}'\n```\n"
  - title: 长上下文配置 (TP8, CP2, YaRN)
    content: "单节点 PD 混合部署，使用 Context Parallelism 和 YaRN 扩展上下文至 135K：\n\n```bash\nexport HCCL_IF_IP=<node_ip>\nexport GLOO_SOCKET_IFNAME=<ifname>\n\
      export TP_SOCKET_IFNAME=<ifname>\nexport HCCL_SOCKET_IFNAME=<ifname>\nexport HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport\
      \ HCCL_BUFFSIZE=1024\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport OMP_NUM_THREADS=1\necho performance\
      \ | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\nsysctl -w vm.swappiness=0\nsysctl -w kernel.numa_balancing=0\n\
      sysctl kernel.sched_migration_cost_ns=50000\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export TASK_QUEUE_ENABLE=1\n\nvllm serve your_model_path \\\n    --served-model-name qwen3 \\\n    --host <host_ip>\
      \ --port <port> \\\n    --tensor-parallel-size 8 \\\n    --data-parallel-size 1 \\\n    --decode-context-parallel-size\
      \ 2 \\\n    --prefill-context-parallel-size 2 \\\n    --enable-expert-parallel \\\n    --cp-kv-cache-interleave-size\
      \ 128 \\\n    --max-num-seqs 32 \\\n    --max-model-len 135000 \\\n    --max-num-batched-tokens 16384 \\\n    --gpu-memory-utilization\
      \ 0.85 \\\n    --trust-remote-code --quantization ascend \\\n    --no-enable-prefix-caching \\\n    --hf-overrides '{\"\
      rope_parameters\": {\"rope_type\":\"yarn\",\"rope_theta\":1000000,\"factor\":4,\"original_max_position_embeddings\"\
      :131072}}' \\\n    --compilation-config '{\"cudagraph_mode\": \"FULL_DECODE_ONLY\"}' \\\n    --additional-config '{\"\
      enable_cpu_binding\":true, \"enable_flashcomm1\": true, \"enable_fused_mc2\": 1}'\n```\n"
- npu: Atlas 800I A3
  precision: W8A8
  deployment: 多节点-PD分离
  verified: true
  steps:
  - title: 概述
    content: '硬件配置：3 × Atlas 800 A3 (64G × 16)，1 个 Prefill 节点 + 2 个 Decode 节点。


      详细部署指南请参考 [Prefill-Decode Disaggregation Mooncake 验证](https://docs.vllm.ai/projects/ascend/en/latest/tutorials/features/pd_disaggregation_mooncake_multi_node.html)。

      '
  - title: 准备启动脚本
    content: "在每个节点上准备 `launch_online_dp.py`：\n\n```python\nimport argparse\nimport multiprocessing\nimport os\nimport subprocess\n\
      import sys\n\ndef parse_args():\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"--dp-size\", type=int,\
      \ required=True, help=\"Data parallel size.\")\n    parser.add_argument(\"--tp-size\", type=int, default=1, help=\"\
      Tensor parallel size.\")\n    parser.add_argument(\"--dp-size-local\", type=int, default=-1, help=\"Local data parallel\
      \ size.\")\n    parser.add_argument(\"--dp-rank-start\", type=int, default=0, help=\"Starting rank for data parallel.\"\
      )\n    parser.add_argument(\"--dp-address\", type=str, required=True, help=\"IP address for data parallel master node.\"\
      )\n    parser.add_argument(\"--dp-rpc-port\", type=str, default=12345, help=\"Port for data parallel master node.\"\
      )\n    parser.add_argument(\"--vllm-start-port\", type=int, default=9000, help=\"Starting port for the engine.\")\n\
      \    return parser.parse_args()\n\nargs = parse_args()\ndp_size = args.dp_size\ntp_size = args.tp_size\ndp_size_local\
      \ = args.dp_size_local if args.dp_size_local != -1 else dp_size\ndp_rank_start = args.dp_rank_start\ndp_address = args.dp_address\n\
      dp_rpc_port = args.dp_rpc_port\nvllm_start_port = args.vllm_start_port\n\ndef run_command(visible_devices, dp_rank,\
      \ vllm_engine_port):\n    command = [\n        \"bash\", \"./run_dp_template.sh\",\n        visible_devices, str(vllm_engine_port),\n\
      \        str(dp_size), str(dp_rank),\n        dp_address, dp_rpc_port, str(tp_size),\n    ]\n    subprocess.run(command,\
      \ check=True)\n\nif __name__ == \"__main__\":\n    template_path = \"./run_dp_template.sh\"\n    if not os.path.exists(template_path):\n\
      \        print(f\"Template file {template_path} does not exist.\")\n        sys.exit(1)\n    processes = []\n    for\
      \ i in range(dp_size_local):\n        dp_rank = dp_rank_start + i\n        vllm_engine_port = vllm_start_port + i\n\
      \        visible_devices = \",\".join(str(x) for x in range(i * tp_size, (i + 1) * tp_size))\n        process = multiprocessing.Process(\n\
      \            target=run_command,\n            args=(visible_devices, dp_rank, vllm_engine_port)\n        )\n       \
      \ processes.append(process)\n        process.start()\n    for process in processes:\n        process.join()\n```\n"
  - title: Prefill 节点配置
    content: "```bash\nnic_name=\"<your_nic_name>\"\nlocal_ip=\"<your_ip>\"\nexport HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\n\
      export TP_SOCKET_IFNAME=$nic_name\nexport HCCL_SOCKET_IFNAME=$nic_name\nexport HCCL_BUFFSIZE=512\nexport HCCL_OP_EXPANSION_MODE=\"\
      AIV\"\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport OMP_NUM_THREADS=1\necho performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\n\
      sysctl -w vm.swappiness=0\nsysctl -w kernel.numa_balancing=0\nsysctl kernel.sched_migration_cost_ns=50000\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export TASK_QUEUE_ENABLE=1\nexport LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH\n\
      export ASCEND_RT_VISIBLE_DEVICES=$1\n\nvllm serve \"/data/weights/Qwen3-235B-A22B-w8a8-rot\" \\\n    --host 0.0.0.0\
      \ --port $2 \\\n    --data-parallel-size $3 --data-parallel-rank $4 \\\n    --data-parallel-address $5 --data-parallel-rpc-port\
      \ $6 \\\n    --tensor-parallel-size $7 \\\n    --enable-expert-parallel \\\n    --served-model-name qwen3_235b \\\n\
      \    --max-model-len 40960 --max-num-batched-tokens 16384 \\\n    --max-num-seqs 24 --trust-remote-code \\\n    --gpu-memory-utilization\
      \ 0.9 --quantization ascend \\\n    --no-enable-prefix-caching --enforce-eager \\\n    --additional-config '{\"enable_flashcomm1\"\
      : true, \"enable_fused_mc2\": 1}' \\\n    --kv-transfer-config \\\n        '{\"kv_connector\": \"MooncakeConnectorV1\"\
      , \\\n        \"kv_role\": \"kv_producer\", \"kv_port\": \"30000\", \"engine_id\": \"0\", \\\n        \"kv_connector_extra_config\"\
      : { \\\n            \"use_ascend_direct\": true, \\\n            \"prefill\": {\"dp_size\": 2, \"tp_size\": 8}, \\\n\
      \            \"decode\": {\"dp_size\": 8, \"tp_size\": 4} \\\n        }}'\n```\n"
  - title: Decode 节点配置
    content: "```bash\nnic_name=\"<your_nic_name>\"\nlocal_ip=\"<your_ip>\"\nexport HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\n\
      export TP_SOCKET_IFNAME=$nic_name\nexport HCCL_SOCKET_IFNAME=$nic_name\nexport HCCL_BUFFSIZE=1024\nexport HCCL_OP_EXPANSION_MODE=\"\
      AIV\"\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport OMP_NUM_THREADS=1\necho performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\n\
      sysctl -w vm.swappiness=0\nsysctl -w kernel.numa_balancing=0\nsysctl kernel.sched_migration_cost_ns=50000\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export TASK_QUEUE_ENABLE=1\nexport LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH\n\
      export VLLM_TORCH_PROFILER_WITH_STACK=0\nexport ASCEND_RT_VISIBLE_DEVICES=$1\n\nvllm serve \"/data/weights/Qwen3-235B-A22B-w8a8-rot\"\
      \ \\\n    --host 0.0.0.0 --port $2 \\\n    --data-parallel-size $3 --data-parallel-rank $4 \\\n    --data-parallel-address\
      \ $5 --data-parallel-rpc-port $6 \\\n    --tensor-parallel-size $7 \\\n    --enable-expert-parallel \\\n    --served-model-name\
      \ qwen3_235b \\\n    --max-model-len 40960 --max-num-batched-tokens 512 \\\n    --max-num-seqs 128 --trust-remote-code\
      \ \\\n    --gpu-memory-utilization 0.9 --quantization ascend \\\n    --no-enable-prefix-caching --async-scheduling \\\
      \n    --compilation-config '{\"cudagraph_mode\":\"FULL_DECODE_ONLY\"}' \\\n    --additional-config '{\"enable_flashcomm1\"\
      : true, \"enable_fused_mc2\": 2}' \\\n    --kv-transfer-config \\\n        '{\"kv_connector\": \"MooncakeConnectorV1\"\
      , \\\n        \"kv_role\": \"kv_consumer\", \"kv_port\": \"30100\", \"engine_id\": \"1\", \\\n        \"kv_connector_extra_config\"\
      : { \\\n            \"use_ascend_direct\": true, \\\n            \"prefill\": {\"dp_size\": 2, \"tp_size\": 8}, \\\n\
      \            \"decode\": {\"dp_size\": 8, \"tp_size\": 4} \\\n        }}'\n```\n"
  - title: 启动服务
    content: "**Prefill 节点：**\n\n```bash\npython launch_online_dp.py \\\n    --dp-size 2 --tp-size 8 \\\n    --dp-size-local\
      \ 2 --dp-rank-start 0 \\\n    --dp-address <prefill_ip> --dp-rpc-port 54951 \\\n    --vllm-start-port 9123\n```\n\n\
      **Decode 节点 0：**\n\n```bash\npython launch_online_dp.py \\\n    --dp-size 8 --tp-size 4 \\\n    --dp-size-local 4 --dp-rank-start\
      \ 0 \\\n    --dp-address <decode_ip> --dp-rpc-port 54951 \\\n    --vllm-start-port 9123\n```\n\n**Decode 节点 1：**\n\n\
      ```bash\npython launch_online_dp.py \\\n    --dp-size 8 --tp-size 4 \\\n    --dp-size-local 4 --dp-rank-start 4 \\\n\
      \    --dp-address <decode_ip> --dp-rpc-port 54951 \\\n    --vllm-start-port 9123\n```\n"
  - title: 请求转发代理
    content: "在可访问两个节点的机器上运行 proxy：\n\n```bash\nunset http_proxy https_proxy\n\npython load_balance_proxy_server_example.py\
      \ \\\n  --port 38085 --host <prefill_ip> \\\n  --prefiller-hosts <prefill_ip> <prefill_ip> \\\n  --prefiller-ports 9123\
      \ 9124 \\\n  --decoder-hosts \\\n    <decode0_ip> <decode0_ip> <decode0_ip> <decode0_ip> \\\n    <decode1_ip> <decode1_ip>\
      \ <decode1_ip> <decode1_ip> \\\n  --decoder-ports \\\n    9123 9124 9125 9126 \\\n    9123 9124 9125 9126\n```\n\n>\
      \ Proxy 脚本可从 [vllm-ascend 仓库](https://github.com/vllm-project/vllm-ascend/blob/main/examples/disaggregated_prefill_v1/load_balance_proxy_server_example.py)\
      \ 获取。\n"
