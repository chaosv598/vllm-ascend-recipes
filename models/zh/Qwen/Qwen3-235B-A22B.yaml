      \ 8 \\\n    --data-parallel-size 1 \\\n    --seed 1024 \\\n    --quantization ascend \\\n    --served-model-name qwen3\
      \ \\\n    --max-num-seqs 32 \\\n    --max-model-len 131072 \\\n    --max-num-batched-tokens 8096 \\\n    --enable-expert-parallel\
      \ \\\n    --trust-remote-code \\\n    --gpu-memory-utilization 0.95 \\\n    --hf-overrides '{\"rope_parameters\": {\"\
