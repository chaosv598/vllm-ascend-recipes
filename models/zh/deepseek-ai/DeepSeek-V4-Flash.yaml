env_setup:
  pip:
    content: '```bash

      git clone https://github.com/vllm-project/vllm.git

      cd vllm && pip install -e .


      git clone https://github.com/vllm-project/vllm-ascend.git

      cd vllm-ascend && pip install -e .

      ```


      > 多节点部署时，需在每个节点上执行相同的安装步骤。

      '
  container:
    content: "**A3 系列：**\n\n```bash\nexport IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1-a3\ndocker run --rm \\\n    --name\
      \ vllm-ascend \\\n    --shm-size=512g \\\n    --net=host \\\n    --device /dev/davinci0 \\\n    --device /dev/davinci1\
      \ \\\n    --device /dev/davinci2 \\\n    --device /dev/davinci3 \\\n    --device /dev/davinci4 \\\n    --device /dev/davinci5\
      \ \\\n    --device /dev/davinci6 \\\n    --device /dev/davinci7 \\\n    --device /dev/davinci8 \\\n    --device /dev/davinci9\
      \ \\\n    --device /dev/davinci10 \\\n    --device /dev/davinci11 \\\n    --device /dev/davinci12 \\\n    --device /dev/davinci13\
      \ \\\n    --device /dev/davinci14 \\\n    --device /dev/davinci15 \\\n    --device /dev/davinci_manager \\\n    --device\
      \ /dev/devmm_svm \\\n    --device /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi \\\n    -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool\
      \ \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/\
      \ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info\
      \ \\\n    -v /etc/hccn.conf:/etc/hccn.conf \\\n    -it $IMAGE bash\n```\n\n**A2 系列：**\n\n```bash\nexport IMAGE=quay.io/ascend/vllm-ascend:v0.22.1rc1\n\
      docker run --rm \\\n    --name vllm-ascend \\\n    --shm-size=512g \\\n    --net=host \\\n    --device /dev/davinci0\
      \ \\\n    --device /dev/davinci1 \\\n    --device /dev/davinci2 \\\n    --device /dev/davinci3 \\\n    --device /dev/davinci4\
      \ \\\n    --device /dev/davinci5 \\\n    --device /dev/davinci6 \\\n    --device /dev/davinci7 \\\n    --device /dev/davinci_manager\
      \ \\\n    --device /dev/devmm_svm \\\n    --device /dev/hisi_hdc \\\n    -v /usr/local/dcmi:/usr/local/dcmi \\\n   \
      \ -v /usr/local/Ascend/driver/tools/hccn_tool:/usr/local/Ascend/driver/tools/hccn_tool \\\n    -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi\
      \ \\\n    -v /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/ \\\n    -v /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info\
      \ \\\n    -v /etc/ascend_install.info:/etc/ascend_install.info \\\n    -v /etc/hccn.conf:/etc/hccn.conf \\\n    -it\
      \ $IMAGE bash\n```\n\n> 启动后可通过 `docker ps` 验证容器是否正常运行。\n"
scenarios:
- npu: Atlas 800 A2
  precision: W8A8
  deployment: 单节点-多卡
  verified: true
  steps:
  - title: 环境变量配置
    content: '```bash

      export OMP_PROC_BIND=false

      export OMP_NUM_THREADS=10

      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True

      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD

      export HCCL_BUFFSIZE=1024

      export VLLM_ASCEND_ENABLE_FLASHCOMM1=1

      export TASK_QUEUE_ENABLE=1

      export HCCL_OP_EXPANSION_MODE="AIV"

      ```

      '
  - title: 启动服务
    content: "```bash\nvllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp \\\n    --max-model-len\
      \ 133120 \\\n    --max-num-batched-tokens 8192 \\\n    --served-model-name dsv4 \\\n    --gpu-memory-utilization 0.9\
      \ \\\n    --max-num-seqs 32 \\\n    --data-parallel-size 1 \\\n    --tensor-parallel-size 8 \\\n    --enable-expert-parallel\
      \ \\\n    --tokenizer-mode deepseek_v4 \\\n    --tool-call-parser deepseek_v4 \\\n    --enable-auto-tool-choice \\\n\
      \    --reasoning-parser deepseek_v4 \\\n    --safetensors-load-strategy 'prefetch' \\\n    --no-enable-prefix-caching\
      \ \\\n    --model-loader-extra-config='{\"enable_multithread_load\": \"true\", \"num_threads\": 128}' \\\n    --quantization\
      \ ascend \\\n    --port 8900 \\\n    --block-size 128 \\\n    --speculative-config '{\"num_speculative_tokens\": 1,\"\
      method\": \"mtp\",\"enforce_eager\": true}' \\\n    --compilation-config '{\"cudagraph_mode\": \"FULL_DECODE_ONLY\"\
      }' \\\n    --async-scheduling \\\n    --additional-config '{\n        \"ascend_compilation_config\": {\n           \
      \ \"enable_npugraph_ex\": true,\n            \"enable_static_kernel\": false\n        },\n        \"enable_cpu_binding\"\
      : true,\n        \"enable_dsa_cp\": true,\n        \"multistream_overlap_shared_expert\": true\n    }'\n```\n\n**关键参数说明：**\n\
      \n- `--speculative-config`：配置 MTP 投机解码加速推理\n- `--compilation-config '{\"cudagraph_mode\":\"FULL_DECODE_ONLY\"}'`：Decode\
      \ 阶段全 ACL 图执行，降低调度延迟\n- `--async-scheduling`：异步调度，CPU 调度与 NPU 计算重叠\n- `VLLM_ASCEND_ENABLE_FLASHCOMM1=1`：FlashComm 通信优化\n"
  - title: 验证服务
    content: "```bash\ncurl http://<node0_ip>:8900/v1/chat/completions \\\n    -H \"Content-Type: application/json\" \\\n\
      \    -d '{\n        \"model\": \"dsv4\",\n        \"messages\": [\n            {\"role\": \"user\", \"content\": \"\
      Who are you?\"}\n        ],\n        \"max_tokens\": 256,\n        \"temperature\": 0\n    }'\n```\n\n> 预期返回 HTTP 200\
      \ OK，JSON 响应包含 `choices` 字段。\n"
