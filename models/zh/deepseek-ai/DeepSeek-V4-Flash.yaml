prerequisites:
- title: 硬件要求
  content: '- **Atlas 800 A3 (128G × 8)**：1 节点可部署量化版本

    - **Atlas 800 A2 (64G × 8)**：1 节点可部署量化版本


    建议将模型权重下载到多节点共享目录，如 `/root/.cache/`。

    '
- title: 多节点通信验证（可选）
  content: '如需部署多节点环境，需先验证多节点通信环境。


    参考 [多节点通信验证指南](https://docs.vllm.ai/projects/ascend/en/latest/installation.html#verify-multi-node-communication)。

