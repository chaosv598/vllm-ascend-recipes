- npu: Atlas 800 A3
  precision: W8A8
  deployment: 多节点-PD分离
  verified: true
  steps:
  - title: 准备启动脚本
    content: "在每个节点上准备 `launch_online_dp.py`：\n\n```python\nimport argparse\nimport multiprocessing\nimport os\nimport subprocess\n\
      import sys\n\ndef parse_args():\n    parser = argparse.ArgumentParser()\n    parser.add_argument(\"--dp-size\", type=int,\
      \ required=True, help=\"Data parallel size.\")\n    parser.add_argument(\"--tp-size\", type=int, default=1, help=\"\
      Tensor parallel size.\")\n    parser.add_argument(\"--dp-size-local\", type=int, default=-1, help=\"Local data parallel\
      \ size.\")\n    parser.add_argument(\"--dp-rank-start\", type=int, default=0, help=\"Starting rank for data parallel.\"\
      )\n    parser.add_argument(\"--dp-address\", type=str, required=True, help=\"IP address for data parallel master node.\"\
      )\n    parser.add_argument(\"--dp-rpc-port\", type=str, default=12345, help=\"Port for data parallel master node.\"\
      )\n    parser.add_argument(\"--vllm-start-port\", type=int, default=9000, help=\"Starting port for the engine.\")\n\
      \    return parser.parse_args()\n\nargs = parse_args()\ndp_size = args.dp_size\ntp_size = args.tp_size\ndp_size_local\
      \ = args.dp_size_local if args.dp_size_local != -1 else dp_size\ndp_rank_start = args.dp_rank_start\ndp_address = args.dp_address\n\
      dp_rpc_port = args.dp_rpc_port\nvllm_start_port = args.vllm_start_port\n\ndef run_command(visible_devices, dp_rank,\
      \ vllm_engine_port):\n    command = [\n        \"bash\", \"./run_dp_template.sh\",\n        visible_devices, str(vllm_engine_port),\n\
      \        str(dp_size), str(dp_rank),\n        dp_address, dp_rpc_port, str(tp_size),\n    ]\n    subprocess.run(command,\
      \ check=True)\n\nif __name__ == \"__main__\":\n    processes = []\n    for i in range(dp_size_local):\n        dp_rank\
      \ = dp_rank_start + i\n        vllm_engine_port = vllm_start_port + i\n        visible_devices = \",\".join(str(x) for\
      \ x in range(i * tp_size, (i + 1) * tp_size))\n        process = multiprocessing.Process(\n            target=run_command,\n\
      \            args=(visible_devices, dp_rank, vllm_engine_port)\n        )\n        processes.append(process)\n     \
      \   process.start()\n    for process in processes:\n        process.join()\n```\n"
  - title: Prefill 节点配置 (run_dp_template.sh)
    content: "```bash\nnic_name=\"xxxx\"  # change to your own nic name\nlocal_ip=xx.xx.xx.1  # change to your own ip\nexport\
      \ HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\nexport TP_SOCKET_IFNAME=$nic_name\nexport HCCL_SOCKET_IFNAME=$nic_name\n\
      export VLLM_RPC_TIMEOUT=3600000\nexport VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS=30000\nexport HCCL_EXEC_TIMEOUT=204\nexport\
      \ HCCL_CONNECT_TIMEOUT=120\nexport OMP_PROC_BIND=false\nexport OMP_NUM_THREADS=10\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\n\
      export HCCL_BUFFSIZE=2560\nexport TASK_QUEUE_ENABLE=1\nexport VLLM_ASCEND_ENABLE_FLASHCOMM1=1\nexport HCCL_OP_EXPANSION_MODE=\"\
      AIV\"\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\nexport ASCEND_RT_VISIBLE_DEVICES=$1\n\
      \nvllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp \\\n  --host 0.0.0.0 \\\n  --port\
      \ $2 \\\n  --data-parallel-size $3 \\\n  --data-parallel-rank $4 \\\n  --data-parallel-address $5 \\\n  --data-parallel-rpc-port\
      \ $6 \\\n  --tensor-parallel-size $7 \\\n  --enable-expert-parallel \\\n  --seed 1024 \\\n  --served-model-name dsv4\
      \ \\\n  --max-model-len 1048576 \\\n  --max-num-batched-tokens 8192 \\\n  --max-num-seqs 16 \\\n  --no-disable-hybrid-kv-cache-manager\
      \ \\\n  --model-loader-extra-config='{\"enable_multithread_load\": \"true\", \"num_threads\": 128}' \\\n  --no-enable-prefix-caching\
      \ \\\n  --safetensors-load-strategy 'prefetch' \\\n  --speculative-config '{\"num_speculative_tokens\": 1,\"method\"\
      : \"mtp\",\"enforce_eager\": true}' \\\n  --trust-remote-code \\\n  --block-size 128 \\\n  --tokenizer-mode deepseek_v4\
      \ \\\n  --tool-call-parser deepseek_v4 \\\n  --enable-auto-tool-choice \\\n  --reasoning-parser deepseek_v4 \\\n  --gpu-memory-utilization\
      \ 0.9 \\\n  --quantization ascend \\\n  --enforce-eager \\\n  --additional-config '{\"enable_cpu_binding\": true, \"\
      enable_shared_expert_dp\": true, \"enable_dsa_cp\": true}' \\\n  --kv-transfer-config \\\n    '{\"kv_connector\": \"\
      MooncakeHybridConnector\", \\\n    \"kv_role\": \"kv_producer\", \\\n    \"kv_port\": \"30000\", \\\n    \"engine_id\"\
      : \"0\", \\\n    \"kv_connector_extra_config\": { \\\n        \"prefill\": {\"dp_size\": 4, \"tp_size\": 4}, \\\n  \
      \      \"decode\": {\"dp_size\": 16, \"tp_size\": 1} \\\n    }}'\n```\n"
  - title: Decode 节点配置 (run_dp_template.sh)
    content: "```bash\nnic_name=\"xxxx\"  # change to your own nic name\nlocal_ip=xx.xx.xx.2  # change to your own ip\nexport\
      \ LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\nexport HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport\
      \ TASK_QUEUE_ENABLE=1\nexport VLLM_RPC_TIMEOUT=3600000\nexport VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS=30000\nexport HCCL_EXEC_TIMEOUT=204\n\
      export HCCL_CONNECT_TIMEOUT=1200\nexport HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\nexport TP_SOCKET_IFNAME=$nic_name\n\
      export HCCL_SOCKET_IFNAME=$nic_name\nexport OMP_PROC_BIND=false\nexport OMP_NUM_THREADS=10\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\n\
      export HCCL_BUFFSIZE=1024\nexport ASCEND_RT_VISIBLE_DEVICES=$1\n\nvllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp\
      \ \\\n  --host 0.0.0.0 \\\n  --port $2 \\\n  --data-parallel-size $3 \\\n  --data-parallel-rank $4 \\\n  --data-parallel-address\
      \ $5 \\\n  --data-parallel-rpc-port $6 \\\n  --tensor-parallel-size $7 \\\n  --enable-expert-parallel \\\n  --seed 1024\
      \ \\\n  --served-model-name dsv4 \\\n  --max-model-len 1048576 \\\n  --max-num-batched-tokens 120 \\\n  --max-num-seqs\
      \ 60 \\\n  --async-scheduling \\\n  --block-size 128 \\\n  --no-disable-hybrid-kv-cache-manager \\\n  --no-enable-prefix-caching\
      \ \\\n  --safetensors-load-strategy 'prefetch' \\\n  --trust-remote-code \\\n  --tokenizer-mode deepseek_v4 \\\n  --model-loader-extra-config='{\"\
      enable_multithread_load\": \"true\", \"num_threads\": 128}' \\\n  --tool-call-parser deepseek_v4 \\\n  --enable-auto-tool-choice\
      \ \\\n  --reasoning-parser deepseek_v4 \\\n  --gpu-memory-utilization 0.9 \\\n  --quantization ascend \\\n  --speculative-config\
      \ '{\"num_speculative_tokens\": 1,\"method\": \"mtp\",\"enforce_eager\": true}' \\\n  --compilation-config '{\"cudagraph_mode\"\
      : \"FULL_DECODE_ONLY\"}' \\\n  --kv-transfer-config \\\n    '{\"kv_connector\": \"MooncakeHybridConnector\", \\\n  \
      \  \"kv_role\": \"kv_consumer\", \\\n    \"kv_port\": \"30100\", \\\n    \"engine_id\": \"1\", \\\n    \"kv_connector_extra_config\"\
      : { \\\n        \"prefill\": {\"dp_size\": 4, \"tp_size\": 4}, \\\n        \"decode\": {\"dp_size\": 16, \"tp_size\"\
      : 1} \\\n    }}' \\\n  --additional-config '{\n      \"ascend_compilation_config\": {\n          \"enable_npugraph_ex\"\
      : true,\n          \"enable_static_kernel\": false\n      },\n      \"enable_cpu_binding\": true,\n      \"multistream_overlap_shared_expert\"\
      : true,\n      \"recompute_scheduler_enable\": true\n  }'\n```\n\n> `recompute_scheduler_enable: true`：当 Decode 节点 KV\
      \ Cache 不足时，请求会发回 Prefill 节点重新计算。\n"
  - title: 启动服务
    content: "**Prefill 节点：**\n\n```bash\npython launch_online_dp.py --dp-size 4 --tp-size 4 --dp-size-local 4 \\\n  --dp-rank-start\
      \ 0 --dp-address xx.xx.xx.1 --dp-rpc-port 12321 --vllm-start-port 7100\n```\n\n**Decode 节点：**\n\n```bash\npython launch_online_dp.py\
      \ --dp-size 16 --tp-size 1 --dp-size-local 16 \\\n  --dp-rank-start 0 --dp-address xx.xx.xx.2 --dp-rpc-port 12321 --vllm-start-port\
      \ 7100\n```\n"
  - title: 部署 P-D 分离代理
    content: '参考 [Prefill-Decode Disaggregation (Mooncake)](https://docs.vllm.ai/projects/ascend/en/latest/tutorials/features/pd_disaggregation_mooncake_multi_node.html)
      部署 P-D 分离代理。


      > PD 分离需要 vllm-ascend 0.9+，且需要跨节点高速互联（RoCE）。

      '
- npu: Atlas 800 A2
  precision: W8A8
  deployment: 多节点-PD分离
  verified: true
  steps:
  - title: 概述
    content: 'A2 系列多节点 PD 分离部署，推荐使用 4*1P 1*4D 配比以获得最佳性能。


      需要在每个节点上准备 `launch_online_dp.py` 和 `run_dp_template.sh` 脚本（与 A3 系列相同）。

      '
  - title: Prefill 节点配置 (run_dp_template.sh)
    content: "```bash\nnic_name=\"xxxxxx\"  # eg. \"enp67s0f0np0\"\nlocal_ip=$(hostname -I | awk -F \" \" '{print $1}')\n\
      export LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\nexport HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport\
      \ TASK_QUEUE_ENABLE=1\nexport VLLM_RPC_TIMEOUT=3600000\nexport VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS=30000\nexport HCCL_EXEC_TIMEOUT=204\n\
      export HCCL_CONNECT_TIMEOUT=1200\nexport HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\nexport TP_SOCKET_IFNAME=$nic_name\n\
      export HCCL_SOCKET_IFNAME=$nic_name\nexport OMP_PROC_BIND=false\nexport OMP_NUM_THREADS=10\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\n\
      export HCCL_BUFFSIZE=1024\nexport ASCEND_RT_VISIBLE_DEVICES=$1\n\nvllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp\
      \ \\\n  --host 0.0.0.0 --port $2 \\\n  --data-parallel-size $3 --data-parallel-rank $4 \\\n  --data-parallel-address\
      \ $5 --data-parallel-rpc-port $6 \\\n  --tensor-parallel-size $7 \\\n  --enable-expert-parallel --seed 1024 \\\n  --served-model-name\
      \ dsv4 \\\n  --max-model-len 135000 --max-num-batched-tokens 4096 \\\n  --max-num-seqs 16 --block-size 128 \\\n  --enforce-eager\
      \ --async-scheduling \\\n  --no-disable-hybrid-kv-cache-manager --enable-prefix-caching \\\n  --trust-remote-code --gpu-memory-utilization\
      \ 0.9 \\\n  --quantization ascend --safetensors-load-strategy 'prefetch' \\\n  --model-loader-extra-config='{\"enable_multithread_load\"\
      : \"true\", \"num_threads\": 128}' \\\n  --tokenizer-mode deepseek_v4 --tool-call-parser deepseek_v4 \\\n  --enable-auto-tool-choice\
      \ --reasoning-parser deepseek_v4 \\\n  --additional-config '{\"enable_cpu_binding\": true, \"enable_shared_expert_dp\"\
      : true}' \\\n  --speculative-config '{\"num_speculative_tokens\": 1, \"method\": \"mtp\",\"enforce_eager\": true}' \\\
      \n  --kv-transfer-config \\\n    '{\"kv_connector\": \"MooncakeHybridConnector\", \\\n    \"kv_role\": \"kv_producer\"\
      , \"kv_port\": \"30000\", \"engine_id\": \"0\", \\\n    \"kv_connector_extra_config\": { \\\n        \"prefill\": {\"\
      dp_size\": 8, \"tp_size\": 1}, \\\n        \"decode\": {\"dp_size\": 32, \"tp_size\": 1} \\\n    }}'\n```\n\n> 每个 P\
      \ 实例只需修改 `kv_port` 和 `engine_id`，`engine_id` 从 0 递增，`kv_port` 需唯一（如 30000, 30100...）。\n"
  - title: Decode 节点配置 (run_dp_template.sh)
    content: "```bash\nnic_name=\"xxxxxx\"\nlocal_ip=$(hostname -I | awk -F \" \" '{print $1}')\nexport LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD\n\
      export HCCL_OP_EXPANSION_MODE=\"AIV\"\nexport TASK_QUEUE_ENABLE=1\nexport VLLM_RPC_TIMEOUT=3600000\nexport VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS=30000\n\
      export HCCL_EXEC_TIMEOUT=204\nexport HCCL_CONNECT_TIMEOUT=1200\nexport HCCL_IF_IP=$local_ip\nexport GLOO_SOCKET_IFNAME=$nic_name\n\
      export TP_SOCKET_IFNAME=$nic_name\nexport HCCL_SOCKET_IFNAME=$nic_name\nexport OMP_PROC_BIND=false\nexport OMP_NUM_THREADS=10\n\
      export PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\nexport HCCL_BUFFSIZE=1024\nexport ASCEND_RT_VISIBLE_DEVICES=$1\n\
      \nvllm serve /root/.cache/modelscope/hub/models/vllm-ascend/DeepSeek-V4-Flash-w8a8-mtp \\\n  --host 0.0.0.0 --port $2\
      \ \\\n  --data-parallel-size $3 --data-parallel-rank $4 \\\n  --data-parallel-address $5 --data-parallel-rpc-port $6\
      \ \\\n  --tensor-parallel-size $7 \\\n  --enable-expert-parallel --seed 1024 \\\n  --served-model-name dsv4 \\\n  --max-model-len\
      \ 135000 --max-num-batched-tokens 60 \\\n  --max-num-seqs 30 --async-scheduling --block-size 128 \\\n  --no-disable-hybrid-kv-cache-manager\
      \ --no-enable-prefix-caching \\\n  --trust-remote-code --gpu-memory-utilization 0.9 \\\n  --quantization ascend --safetensors-load-strategy\
      \ 'prefetch' \\\n  --model-loader-extra-config='{\"enable_multithread_load\": \"true\", \"num_threads\": 128}' \\\n\
      \  --tokenizer-mode deepseek_v4 --tool-call-parser deepseek_v4 \\\n  --enable-auto-tool-choice --reasoning-parser deepseek_v4\
      \ \\\n  --speculative-config '{\"num_speculative_tokens\": 1, \"method\": \"mtp\",\"enforce_eager\": true}' \\\n  --compilation-config\
      \ '{\"cudagraph_mode\": \"FULL_DECODE_ONLY\"}' \\\n  --kv-transfer-config \\\n    '{\"kv_connector\": \"MooncakeHybridConnector\"\
      , \\\n    \"kv_role\": \"kv_consumer\", \"kv_port\": \"30400\", \"engine_id\": \"4\", \\\n    \"kv_connector_extra_config\"\
      : { \\\n        \"prefill\": {\"dp_size\": 8, \"tp_size\": 1}, \\\n        \"decode\": {\"dp_size\": 32, \"tp_size\"\
      : 1} \\\n    }}' \\\n  --additional-config '{\n      \"ascend_compilation_config\": {\n          \"enable_npugraph_ex\"\
      : true,\n          \"enable_static_kernel\": false\n      },\n      \"enable_cpu_binding\": true,\n      \"multistream_overlap_shared_expert\"\
      : true,\n      \"recompute_scheduler_enable\": true\n  }'\n```\n"
  - title: 启动服务
    content: "**Prefill 节点：**\n\n```bash\npython launch_online_dp.py --dp-size 8 --tp-size 1 --dp-size-local 8 \\\n  --dp-rank-start\
      \ 0 --dp-address x.x.x.x --dp-rpc-port 12321 --vllm-start-port 7100\n```\n\n> 每个 P 实例只有 `--dp-address` 参数不同，需配置为与同组其他实例在同一子网内的\
      \ IP。\n\n**Decode 节点：**\n\n```bash\npython launch_online_dp.py --dp-size 32 --tp-size 1 --dp-size-local 8 \\\n  --dp-rank-start\
      \ x --dp-address x.x.x.x --dp-rpc-port 12321 --vllm-start-port 7100\n```\n\n> 每个 D 实例只有 `--dp-rank-start` 参数不同，分别配置为\
      \ 0, 8, 16, 24。`--dp-address` 设为主 D 节点 IP。\n"
  - title: 部署 P-D 分离代理
    content: '参考 [Prefill-Decode Disaggregation (Deepseek)](https://docs.vllm.ai/projects/ascend/en/latest/tutorials/features/pd_disaggregation_mooncake_multi_node.html)
      部署 proxy。

      '
